name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release a publier (ex: v2.0.1)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/webapp

jobs:
  prepare:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            REF="${{ github.ref }}"
          else
            TAG="${{ inputs.tag }}"
            REF="refs/tags/${TAG}"
          fi

          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-*)
              ;;
            *)
              echo "Tag invalide: $TAG"
              exit 1
              ;;
          esac

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "source_ref=$REF" >> "$GITHUB_OUTPUT"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.create_release.outputs.html_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: "WebApp ${{ needs.prepare.outputs.release_tag }}"
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.release_tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.release_tag }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-demo:
    name: Deploy Demo to Render
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --fail \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
