services:
  webapp-v2:
    container_name: webapp-v2
    image: node:20-bookworm-slim
    environment:
      NODE_ENV: production
      PORT: "3004"
      DATABASE_PATH: /app/data/webapp-v2.db
    labels:
      cosmos-force-network-mode: bridge
    ports:
      - "3004:3004"
    volumes:
      - /cosmos-storage/webapp-v2:/app
    working_dir: /app
    command: sh /app/start.sh
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: bridge
